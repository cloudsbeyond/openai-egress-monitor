# OpenAI egress status app config.

# Semicolon-separated public IP probe chain.
# Format: adapter|url
# Supported adapters: ipinfo-json, ipapi-json, ipwhois-json
PUBLIC_IP_PROBES="ipinfo-json|https://ipinfo.io/json;ipapi-json|https://ipapi.co/json/;ipwhois-json|https://ipwho.is/"

TRACE_URL="https://chatgpt.com/cdn-cgi/trace"
API_URL="https://api.openai.com"
REFRESH_INTERVAL_SECONDS="300"

# Space-separated ChatGPT trace country codes considered acceptable.
EXPECTED_LOCS="JP SG"

LOG_DIR="$HOME/Library/Logs/openai-egress-monitor"

# IP-only changes are logged but do not trigger notifications.
NOTIFY_ON_CHANGE="1"
NOTIFY_ON_UNEXPECTED="1"

# Clicking app notifications opens this URL.
NOTIFICATION_OPEN_URL="https://chatgpt.com/cdn-cgi/trace"
